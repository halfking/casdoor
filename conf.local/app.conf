# ============================================
# 开轩平台 - Casdoor 认证服务配置（本地开发）
# 修改历史:
#   v1.0 2026-03-14 本地开发版本，基于 conf/app.conf 调整
#                   origin=http://localhost:8000（本地访问）
# ============================================
appname = casdoor
httpport = 8000
runmode = dev
copyrequestbody = true
driverName = postgres
dataSourceName = user=casdoor password=${CASDOOR_DB_PASS} host=postgres port=5432 dbname=casdoor sslmode=disable
dbName = casdoor
tableNamePrefix =
showSql = true
redisEndpoint =
defaultStorageProvider =
isCloudIntranet = false
authState = "casdoor"
socks5Proxy = ""
verificationCodeTimeout = 10
initScore = 0
logPostOnly = false
isUsernameLowered = false
# 本地部署：Casdoor 对外暴露地址为 localhost:8000
origin = http://localhost:8000
# 本地前端访问地址（用于 CORS/重定向）
originFrontend = http://localhost:8081
staticBaseUrl = "https://cdn.casbin.org"
isDemoMode = false
batchSize = 100
enableErrorMask = false
enableGzip = true
inactiveTimeoutMinutes =
ldapServerPort = 389
ldapsCertId = ""
ldapsServerPort = 636
radiusServerPort = 1812
radiusDefaultOrganization = "built-in"
radiusSecret = "secret"
quota = {"organization": -1, "user": -1, "application": -1, "provider": -1}
logConfig = {"adapter":"file", "filename": "logs/casdoor.log", "maxdays":30, "perm":"0770"}
initDataNewOnly = false
initDataFile = "./init_data.json"
frontendBaseDir = "../cc_0"
